name: digital_housing_society
version: 1.0.0+1
publish_to: 'none'
description: Digital Housing Society Applicant Module built with Flutter, Firebase, Material 3 and MVVM.

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  provider: ^6.1.1
  image_picker: ^1.1.2
  file_picker: ^11.0.1
  intl: ^0.18.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  share_plus: ^7.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/backgrounds/
